name: Security Scan

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.repository }}-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: Run pip-audit
        run: |
          echo "::group::pip-audit JSON output"
          python -m pip-audit -r requirements.txt --format=json --output=pip-audit-report.json || true
          cat pip-audit-report.json
          echo "::endgroup::"
          python -m pip-audit -r requirements.txt --format=columns
