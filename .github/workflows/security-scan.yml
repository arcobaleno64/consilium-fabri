name: Security Scan

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.repository }}-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: Run pip-audit
        run: |
          echo "::group::pip-audit JSON output"
          python -m pip-audit -r requirements.txt --format=json --output=pip-audit-report.json || true
          cat pip-audit-report.json
          echo "::endgroup::"
          python -m pip-audit -r requirements.txt --format=columns
