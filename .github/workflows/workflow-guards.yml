name: Workflow Guards

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: workflow-guards-${{ github.repository }}-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Unit Tests
        run: |
          python -m pytest artifacts/scripts/test_guard_units.py -v \
            --cov --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=html:coverage-report \
            --cov-fail-under=45

      - name: Contract Guard
        run: python artifacts/scripts/guard_contract_validator.py --root .

      - name: Prompt Regression
        run: python artifacts/scripts/prompt_regression_validator.py --root .

      - name: Status Guard (all tasks)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          failed=0
          for status_file in artifacts/status/TASK-*.status.json; do
            task_id=$(basename "$status_file" .status.json)
            echo "--- Validating $task_id ---"
            if ! python artifacts/scripts/guard_status_validator.py --task-id "$task_id"; then
              failed=1
            fi
          done
          exit $failed

      - name: Red Team Static Phase
        run: python artifacts/scripts/run_red_team_suite.py --phase static

      - name: Context Stack Validation
        run: python artifacts/scripts/validate_context_stack.py --root .

      - name: Repo Health Dashboard
        run: python artifacts/scripts/repo_health_dashboard.py --root .
